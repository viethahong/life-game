<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Game — Build Your Legend</title>
    <meta name="description" content="Hệ thống MMORPG giúp bạn biến công việc và nỗ lực hằng ngày thành một trò chơi đầy cảm hứng.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js cho Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">
    <div id="app-container">
        <!-- Navigation / Header -->
        <nav id="main-nav">
            <div class="logo">LIFE GAME</div>
            <div class="user-compact-stats">
                <span id="nav-level-badge">LVL 1</span>
                <div class="xp-bar-container">
                    <div id="nav-xp-progress" style="width: 30%"></div>
                </div>
                <span id="nav-gold-display">0 Gold</span>
            </div>
            <button id="menu-toggle" aria-label="Open Menu">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </button>
        </nav>

        <main id="main-content">
            <!-- Dynamic Content Injected Here -->
            <section id="onboarding" class="hidden">
                <h1 class="premium-heading">CHOOSE YOUR PATH</h1>
                <p class="subtitle">Bạn là ai trong thế giới này?</p>
                <div class="class-selection-grid" id="class-grid"></div>
            </section>

            <section id="dashboard">
                <header class="section-header">
                    <h1 id="char-name">Shadow Monk</h1>
                    <p id="char-class-title">Creator • Level 1</p>
                </header>

                <div class="stats-row">
                    <div class="stat-card" data-stat="str">
                        <span class="label">STR</span>
                        <div class="stat-value">10</div>
                        <div class="stat-fill" style="width: 50%"></div>
                    </div>
                    <div class="stat-card" data-stat="int">
                        <span class="label">INT</span>
                        <div class="stat-value">12</div>
                        <div class="stat-fill" style="width: 60%"></div>
                    </div>
                    <div class="stat-card" data-stat="cha">
                        <span class="label">CHA</span>
                        <div class="stat-value">8</div>
                        <div class="stat-fill" style="width: 40%"></div>
                    </div>
                    <div class="stat-card" data-stat="wis">
                        <span class="label">WIS</span>
                        <div class="stat-value">11</div>
                        <div class="stat-fill" style="width: 55%"></div>
                    </div>
                </div>

                <!-- NEW: Journey Map -->
                <section id="journey-section" class="card-section">
                    <div class="card-header">
                        <h2>JOURNEY MAP</h2>
                        <span id="rank-name" class="accent-text">Apprentice</span>
                    </div>
                    <div class="journey-track-container">
                        <div id="journey-progress-bar"></div>
                        <div class="journey-milestones" id="journey-milestones">
                            <!-- Milestones injected here -->
                        </div>
                    </div>
                </section>

                <div class="tabs-nav">
                    <button class="tab-btn active" data-tab="quests">Quests & Loot</button>
                    <button class="tab-btn" data-tab="skills">Skill Tree</button>
                    <button class="tab-btn" data-tab="achievements">Achievements</button>
                    <button class="tab-btn" data-tab="analytics">Analytics</button>
                </div>

                <div id="tab-content">
                    <div id="quests-tab" class="tab-pane active">
                        <div class="content-grid">
                            <div class="column quest-column">
                                <div class="card-header">
                                    <h2>QUEST LOG</h2>
                                    <button class="btn-add" id="add-quest-btn">+</button>
                                </div>
                                <div id="quest-list" class="item-list">
                                    <div class="quest-item empty-state">Chưa có nhiệm vụ hôm nay...</div>
                                </div>
                            </div>

                            <div class="column income-column">
                                <div class="card-header">
                                    <h2>LOOT / INCOME</h2>
                                    <button class="btn-add" id="add-income-btn">+</button>
                                </div>
                                <div id="income-list" class="item-list">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="skills-tab" class="tab-pane">
                        <div class="skills-container">
                            <div class="skills-header">
                                <p>Skill Points: <span id="skill-points-value">0</span></p>
                            </div>
                            <div id="skills-grid" class="skills-grid">
                                <!-- Skills injected here -->
                            </div>
                        </div>
                    </div>

                    <div id="achievements-tab" class="tab-pane">
                        <div id="achievements-grid" class="achievements-grid">
                            <!-- Achievements injected here -->
                        </div>
                    </div>

                    <div id="analytics-tab" class="tab-pane">
                        <div class="analytics-row">
                            <div class="chart-container">
                                <h3>XP PROGRESSION (7 DAYS)</h3>
                                <canvas id="xp-chart"></canvas>
                            </div>
                            <div class="chart-container">
                                <h3>STAT DISTRIBUTION</h3>
                                <canvas id="radar-chart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Modals -->
        <div id="modal-overlay" class="hidden">
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/state.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
